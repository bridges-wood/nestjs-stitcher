directive @key(selectionSet: String!) on OBJECT
directive @merge(
  keyField: String
  keyArg: String
  additionalArgs: String
  key: [String!]
  argsExpr: String
) on FIELD_DEFINITION
directive @computed(selectionSet: String!) on FIELD_DEFINITION

type User @key(selectionSet: "{ id }") {
  id: ID!
  name: String!
  email: String!
}

type Query {
  """
  List all users
  """
  users: [User!]!

  """
  Get a single user by ID. Also serves as the merge entry point for
  cross-service type resolution (gateway uses this via @merge).
  """
  user(id: ID!): User @merge(keyField: "id")
}

type Mutation {
  """
  Create a new user
  """
  createUser(name: String!, email: String!): User!
}
